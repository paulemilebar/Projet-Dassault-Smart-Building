mation (84,5\u202f%\u003cbr\u003ed\u2019autoconsommation). L\u2019\u00e9nergie exc\u00e9dentaire est vendue au r\u00e9seau, g\u00e9n\u00e9rant un revenu de 0,874\u202fEUR. La\u003cbr\u003ebatterie, de capacit\u00e9 maximale de 13,5\u202fkWh, permet de stocker l\u2019\u00e9nergie exc\u00e9dentaire et de la restituer\u003cbr\u003ependant les p\u00e9riodes de forte demande, assurant une flexibilit\u00e9 totale (100\u202f%). Les flux de charge et de\u003cbr\u003ed\u00e9charge sont ponctu\u00e9s par des pics pr\u00e9cis (au niveau de l\u2019achat r\u00e9seau \u00e0 l\u2019heure 0, \u00e0 la vente r\u00e9seau \u00e0\u003cbr\u003el\u2019heure 15, \u00e0 la charge batterie \u00e0 l\u2019heure 0 et \u00e0 la d\u00e9charge batterie \u00e0 l\u2019heure 19).\u003cbr\u003eLe bilan \u00e9nerg\u00e9tique montre que la demande totale servie (48\u202f636\u202fkWh) est enti\u00e8rement satisfaite gr\u00e2ce \u00e0\u003cbr\u003ela combinaison du PV, de la batterie et des achats\u002freventes r\u00e9seau, avec un co\u00fbt net \u00e9nerg\u00e9tique tr\u00e8s\u003cbr\u003efaible (0,757\u202fEUR). Cette architecture autonome garantit une gestion fine des flux, minimise les achats\u003cbr\u003er\u00e9seau et exploite pleinement la flexibilit\u00e9 disponible.","x":0.0,"xref":"paper","y":-0.28,"yref":"paper"}],"shapes":[{"fillcolor":"#f6c4cb","line":{"width":0},"opacity":0.12,"type":"rect","x0":-0.5,"x1":0.5,"xref":"x","y0":0,"y1":1,"yref":"y domain"},{"fillcolor":"#f6c4cb","line":{"width":0},"opacity":0.12,"type":"rect","x0":0.5,"x1":1.5,"xref":"x","y0":0,"y1":1,"yref":"y domain"},{"fillcolor":"#b9e6eb","line":{"width":0},"opacity":0.12,"type":"rect","x0":1.5,"x1":2.5,"xref":"x","y0":0,"y1":1,"yref":"y domain"},{"fillcolor":"#b9e6eb","line":{"width":0},"opacity":0.12,"type":"rect","x0":2.5,"x1":3.5,"xref":"x","y0":0,"y1":1,"yref":"y domain"},{"fillcolor":"#b9e6eb","line":{"width":0},"opacity":0.12,"type":"rect","x0":3.5,"x1":4.5,"xref":"x","y0":0,"y1":1,"yref":"y domain"},{"fillcolor":"#b
